services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vanadium
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rest:
    image: smoh92/vanadium-rest:latest
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=vanadium;Username=postgres;Password=${POSTGRES_PASSWORD}"
      Auth__PasswordHash: ${AUTH_PASSWORD_HASH}
      Auth__JwtSecret: ${AUTH_JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy

  web:
    image: smoh92/vanadium-web:latest
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://localhost:5000}

volumes:
  pgdata:
