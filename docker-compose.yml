services:
  rest:
    image: smoh92/vanadium-rest:0.1.0
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=${DB_HOST:-host.docker.internal};Port=${DB_PORT:-5432};Database=${DB_NAME:-vanadium};Username=${DB_USER:-postgres};Password=${DB_PASSWORD};Keepalive=30;Tcp Keepalive=true;Command Timeout=60"
      Auth__JwtSecret: ${AUTH_JWT_SECRET}
      Auth__PasswordHash: ${AUTH_PASSWORD_HASH}
      Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      Seq__ServerUrl: ${SEQ_URL:-}
      Seq__ApiKey: ${SEQ_API_KEY:-}
      RecycleBin__RetentionDays: ${RECYCLE_BIN_RETENTION_DAYS:-30}
      # Trust X-Forwarded-For ONLY from the reverse proxy that fronts this service,
      # so a client reaching the app port directly cannot forge its IP and bypass the
      # login rate limiter. Set the proxy's IP/subnet (leave unset to trust none):
      #   ForwardedHeaders__KnownProxies__0: "172.20.0.5"      # a specific proxy IP
      #   ForwardedHeaders__KnownNetworks__0: "172.16.0.0/12"  # or the proxy's subnet (CIDR)
    volumes:
      # Persist uploaded files across container recreation/redeploys.
      - vanadium_uploads:/app/uploads

  web:
    image: smoh92/vanadium-web:latest
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      # Injected into the Blazor WASM appsettings at container startup by
      # entrypoint.sh (envsubst). Must be a non-empty mapping or the whole
      # compose file fails validation ("services.web.environment must be a mapping").
      API_BASE_URL: ${API_BASE_URL:-http://localhost:5000}

volumes:
  vanadium_uploads:
